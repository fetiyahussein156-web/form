<!DOCTYPE html>
<html>
<head>
<title>Login Form</title>

<style>

body{
    background-color:#f5f5f5;
    font-family: Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:300px;
    text-align:center;
}

h2{
    margin-bottom:20px;
}

input[type="email"],
input[type="password"]{
    width:100%;
    padding:10px;
    margin:6px 0;
    border:1px solid #ccc;
    border-radius:4px;
}

.remember{
    text-align:left;
    font-size:14px;
    margin:10px 0;
}

button{
    width:100%;
    padding:10px;
    background-color:#2b6de0;
    border:none;
    color:white;
    border-radius:20px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background-color:#1f56b5;
}

.footer{
    margin-top:15px;
    font-size:12px;
    color:gray;
}

</style>
</head>

<body>

<div class="container">

<h2>Please sign in</h2>

<form>

<input type="email" placeholder="Email address" required>

<input type="password" placeholder="Password" required>

<div class="remember">
<label>
<input type="checkbox"> Remember me
</label>
</div>

<button type="submit">Sign in</button>

</form>

</div>

</body>
</html>
